# DEPRECATED: kept for rollback until two consecutive GitHub-driven releases
# ship successfully. Do not extend.
#
# See docs/refactor-implementation-guide/09-ci-cd-consolidation/.
#
# Manual trigger is preserved so the team retains an emergency build path
# in case the GitHub release workflow regresses.

buildAndroidSenderDockerContainer:
  stage: buildDockerContainers
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  tags:
    - fcast-instance-runner
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - docker build -t $CI_REGISTRY/videostreaming/fcast-android-sender/android-sender-dev:latest .
    - docker push $CI_REGISTRY/videostreaming/fcast-android-sender/android-sender-dev:latest
  when: manual

buildSenderAndroid:
  stage: senders
  image: gitlab.futo.org:5050/videostreaming/fcast-android-sender/android-sender-dev:latest
  tags:
    - fcast-instance-runner
  variables:
    # Runner setup must provide ANDROID_HOME_PATH and THIRDPARTY_DEPS_PATH.
    # ANDROID_HOME_PATH should point at the Android SDK root.
    # THIRDPARTY_DEPS_PATH should contain android-ndk-r28c/ and
    # gstreamer-1.0-android-universal-1.28.0/.
    APP_VERSION_NAME: "1"
    APP_VERSION_CODE: "1"
  script:
    - export ANDROID_HOME="$ANDROID_HOME_PATH"
    - export ANDROID_SDK_ROOT="$ANDROID_HOME_PATH"
    - export ANDROID_NDK_ROOT="$THIRDPARTY_DEPS_PATH/android-ndk-r28c"
    - export ANDROID_NDK_HOME="$THIRDPARTY_DEPS_PATH/android-ndk-r28c"
    - export GSTREAMER_ROOT_ANDROID="$THIRDPARTY_DEPS_PATH/gstreamer-1.0-android-universal-1.28.0"
    - bash ci/build-gstreamer-android-glue.sh
    - bash ci/build-rust-android-lib.sh release
    - ./gradlew assembleRelease -PversionName=$ANDROID_VERSION_NAME -PversionCode=$ANDROID_VERSION_CODE
    - mkdir -p "./$ANDROID_VERSION_CODE"
    - mv ./app/build/outputs/apk/release/app-release-unsigned.apk "./$ANDROID_VERSION_CODE/fcast-sender-release.apk"
  artifacts:
    untracked: false
    when: on_success
    access: all
    expire_in: "30 days"
    paths:
      - $ANDROID_VERSION_CODE/fcast-sender-release.apk
  when: manual
