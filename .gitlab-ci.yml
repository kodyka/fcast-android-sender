buildAndroidSenderDockerContainer:
  stage: buildDockerContainers
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  tags:
    - fcast-instance-runner
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - docker build -t $CI_REGISTRY/videostreaming/fcast-android-sender/android-sender-dev:latest .
    - docker push $CI_REGISTRY/videostreaming/fcast-android-sender/android-sender-dev:latest
  when: manual

buildSenderAndroid:
  stage: senders
  image: gitlab.futo.org:5050/videostreaming/fcast-android-sender/android-sender-dev:latest
  tags:
    - fcast-instance-runner
  variables:
    APP_VERSION_NAME: "1"
    APP_VERSION_CODE: "1"
  script:
    - export ANDROID_HOME="$ANDROID_HOME_PATH"
    - export ANDROID_SDK_ROOT="$ANDROID_HOME_PATH"
    - export ANDROID_NDK_ROOT="$THIRDPARTY_DEPS_PATH/android-ndk-r25c"
    - export ANDROID_NDK_HOME="$THIRDPARTY_DEPS_PATH/android-ndk-r25c"
    - export GSTREAMER_ROOT_ANDROID="$THIRDPARTY_DEPS_PATH/gstreamer-1.0-android-universal-1.28.0"
    - cargo build --release --target aarch64-linux-android
    - ./gradlew assembleRelease -PversionName=$ANDROID_VERSION_NAME -PversionCode=$ANDROID_VERSION_CODE
    - mkdir -p "./$ANDROID_VERSION_CODE"
    - mv ./app/build/outputs/apk/release/app-release-unsigned.apk "./$ANDROID_VERSION_CODE/fcast-sender-release.apk"
  artifacts:
    untracked: false
    when: on_success
    access: all
    expire_in: "30 days"
    paths:
      - $ANDROID_VERSION_CODE/fcast-sender-release.apk
  when: manual
