[package]
name = "gstpop"
version = "0.4.3"
edition = "2021"
license = "GPL-3.0-or-later"
description = "GstreamerPrinceOfParser - embedded library for in-process pipeline management"

[lib]
name = "gstpop"
path = "src/lib.rs"

[dependencies]
gstreamer = "0.25"
gstreamer-pbutils = "0.25"
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = "0.26"
futures-util = { version = "0.3", default-features = false, features = ["sink", "std"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
thiserror = "2"
subtle = "2.6"

# DBus (Linux only). The vendored library mirrors the upstream daemon's
# DBus server, but on non-Linux targets (notably Android) the entire `dbus`
# module is cfg'd out so this dependency is never pulled in.
[target.'cfg(target_os = "linux")'.dependencies]
zbus = { version = "5", default-features = false, features = ["tokio"] }
