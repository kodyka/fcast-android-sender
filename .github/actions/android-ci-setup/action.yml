name: Android CI Setup
description: Provision Java, Rust, Android SDK/NDK, and GStreamer for Android CI jobs.

inputs:
  rust-target:
    description: Rust target triple to install for Android builds.
    required: false
    default: aarch64-linux-android
  android-platforms:
    description: Android SDK platforms to install.
    required: false
    default: "platforms;android-34 platforms;android-35"
  android-build-tools:
    description: Android build-tools package to install.
    required: false
    default: build-tools;35.0.0

runs:
  using: composite
  steps:
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "21"

    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.rust-target }}

    - name: Install Linux build dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          pkg-config \
          automake \
          autoconf \
          libtool \
          libprotobuf-dev \
          protobuf-compiler \
          unzip \
          xz-utils \
          wget \
          curl \
          ninja-build \
          libclang-dev

    - name: Install cargo-ndk
      shell: bash
      run: cargo install cargo-ndk --locked

    - name: Download Android SDK
      shell: bash
      run: |
        mkdir -p thirdparty
        curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdline-tools.zip
        unzip -q /tmp/cmdline-tools.zip -d thirdparty/android-sdk-commandlinetools
        yes | thirdparty/android-sdk-commandlinetools/cmdline-tools/bin/sdkmanager --sdk_root="$GITHUB_WORKSPACE/thirdparty/Android/Sdk" --licenses
        SDK_PACKAGES=(${{ inputs.android-platforms }} ${{ inputs.android-build-tools }})
        thirdparty/android-sdk-commandlinetools/cmdline-tools/bin/sdkmanager \
          --sdk_root="$GITHUB_WORKSPACE/thirdparty/Android/Sdk" \
          --install "${SDK_PACKAGES[@]}"

    - name: Download Android NDK
      shell: bash
      run: |
        mkdir -p thirdparty
        curl -fsSL https://dl.google.com/android/repository/android-ndk-r25c-linux.zip -o /tmp/android-ndk-r25c-linux.zip
        unzip -q /tmp/android-ndk-r25c-linux.zip -d thirdparty

    - name: Download GStreamer Android SDK
      shell: bash
      run: |
        mkdir -p thirdparty/gstreamer-1.0-android-universal-1.28.0
        curl -fsSL --retry 5 https://gstreamer.freedesktop.org/pkg/android/1.28.0/gstreamer-1.0-android-universal-1.28.0.tar.xz -o /tmp/gstreamer-android.tar.xz
        tar -xf /tmp/gstreamer-android.tar.xz -C thirdparty/gstreamer-1.0-android-universal-1.28.0

    - name: Export Android toolchain paths
      shell: bash
      run: |
        echo "ANDROID_HOME=$GITHUB_WORKSPACE/thirdparty/Android/Sdk" >> "$GITHUB_ENV"
        echo "ANDROID_SDK_ROOT=$GITHUB_WORKSPACE/thirdparty/Android/Sdk" >> "$GITHUB_ENV"
        echo "ANDROID_NDK_ROOT=$GITHUB_WORKSPACE/thirdparty/android-ndk-r25c" >> "$GITHUB_ENV"
        echo "ANDROID_NDK_HOME=$GITHUB_WORKSPACE/thirdparty/android-ndk-r25c" >> "$GITHUB_ENV"
        echo "ANDROID_NDK=$GITHUB_WORKSPACE/thirdparty/android-ndk-r25c" >> "$GITHUB_ENV"
        echo "GSTREAMER_ROOT_ANDROID=$GITHUB_WORKSPACE/thirdparty/gstreamer-1.0-android-universal-1.28.0" >> "$GITHUB_ENV"
